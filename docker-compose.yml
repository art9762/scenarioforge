services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scenarioforge
      POSTGRES_USER: scenarioforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scenarioforge-dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scenarioforge"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://scenarioforge:${POSTGRES_PASSWORD:-scenarioforge-dev}@postgres:5432/scenarioforge
      AUTH_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET}
      TRINITY_API_KEY: ${TRINITY_API_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
      STORAGE_DIR: /app/data
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend-data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  backend-data:
